<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Savvion Bookings — Admin Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0D0F0E;--bg-2:#131614;--bg-3:#181C1A;--bg-4:#1E2320;
  --surface:#242927;--surface-2:#2C3230;--surface-3:#343C39;
  --border:rgba(255,255,255,0.06);--border-2:rgba(255,255,255,0.1);
  --ink:#F0F4F1;--ink-2:#C8D4CC;--ink-muted:#7A9080;--ink-faint:#4A5C52;
  --green:#22C97A;--green-dark:#16A066;--green-dim:rgba(34,201,122,0.12);
  --amber:#E8A830;--red:#E85858;--blue:#4A90E2;--purple:#A078E0;
  --font-display:'Syne',sans-serif;--font-body:'DM Sans',sans-serif;--font-mono:'DM Mono',monospace;
  --ease:cubic-bezier(0.16,1,0.3,1);--sidebar:240px;--topbar:56px;
}
html,body{height:100%;overflow-x:hidden}
body{font-family:var(--font-body);background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;display:flex;flex-direction:column}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--surface-3);border-radius:2px}
</style>
</head>
<body>
<h1>New Admin Dashboard</h1>
</body>
</html>
