<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — Savvion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    :root {
      --green: #2da869; --green-dark: #22895a; --green-light: #edf7f2;
      --black: #0d0d0d; --gray-50: #f8f8f6; --gray-100: #f0f0ed;
      --gray-200: #e2e2de; --gray-400: #9a9a95; --gray-600: #565650;
      --white: #ffffff; --danger: #dc2626; --font: 'Plus Jakarta Sans', system-ui, sans-serif;
      --r-sm:8px; --r-md:10px; --r-lg:16px; --r-xl:20px;
    }
    body {
      font-family: var(--font);
      background: radial-gradient(ellipse at 65% 0%, #e4f5ed 0%, #f4f4f2 60%);
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 24px; -webkit-font-smoothing: antialiased;
    }
    .auth-card {
      display: flex; width: 100%; max-width: 400px; min-height: 520px;
      background: var(--white); border-radius: var(--r-xl);
      border: 1px solid var(--gray-200); box-shadow: 0 4px 48px rgba(0,0,0,.08);
      overflow: hidden;
    }
    .auth-form {
      flex: 1; padding: 44px 36px; display: flex; flex-direction: column;
    }
    .brand-logo {
      display: flex; align-items: center; gap: 10px; margin-bottom: 32px;
    }
    .brand-logo-icon {
      width: 36px; height: 36px; border-radius: var(--r-sm);
      background: var(--green); display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 18px;
    }
    .brand-logo-text { color: var(--black); font-weight: 700; font-size: 15px; letter-spacing: -.02em; }
    .auth-title { font-size: 26px; font-weight: 800; letter-spacing: -.03em; color: var(--black); margin-bottom: 8px; }
    .auth-subtitle { font-size: 13px; color: var(--gray-600); margin-bottom: 32px; }
    .form-field { margin-bottom: 20px; }
    .form-field label { display: block; font-size: 12px; font-weight: 600; color: var(--gray-600); margin-bottom: 6px; }
    .form-field input {
      width: 100%; padding: 12px 14px; border: 1px solid var(--gray-200);
      border-radius: var(--r-md); font-family: inherit; font-size: 14px;
      transition: all .2s;
    }
    .form-field input:focus { outline: none; border-color: var(--green); box-shadow: 0 0 0 3px var(--green-light); }
    .form-field input.is-error { border-color: var(--danger); }
    .error-msg { font-size: 12px; color: var(--danger); margin-top: 6px; display: none; }
    .error-msg.is-visible { display: block; }
    .btn {
      width: 100%; padding: 14px; border: none; border-radius: var(--r-md);
      font-family: inherit; font-size: 14px; font-weight: 600; cursor: pointer;
      transition: all .2s; display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-primary { background: var(--black); color: var(--white); }
    .btn-primary:hover { background: var(--gray-600); }
    .btn-primary:disabled { opacity: .5; cursor: not-allowed; }
    .spinner {
      width: 16px; height: 16px; border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff; border-radius: 50%; animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .divider {
      display: flex; align-items: center; gap: 12px; margin: 24px 0; color: var(--gray-400); font-size: 12px;
    }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--gray-200); }
    .btn-google {
      background: var(--white); border: 1px solid var(--gray-200); color: var(--black);
      gap: 10px; padding: 12px;
    }
    .btn-google:hover { background: var(--gray-50); border-color: var(--gray-400); }
    .btn-google img { width: 18px; height: 18px; }
    .back-link {
      text-align: center; margin-top: 24px; font-size: 13px; color: var(--gray-600);
    }
    .back-link a { color: var(--green); text-decoration: none; font-weight: 600; }
    .back-link a:hover { text-decoration: underline; }
    .demo-hint {
      margin-top: 16px; padding: 12px; background: var(--green-light);
      border-radius: var(--r-md); font-size: 12px; color: var(--green-text);
    }
  </style>
</head>
<body>
  <div class="auth-card">
    <div class="auth-form">
      <div class="brand-logo">
        <div class="brand-logo-icon"><i class="ti ti-lock"></i></div>
        <div class="brand-logo-text">Savvion Admin</div>
      </div>
      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-subtitle">Sign in to access the admin panel</p>

      <!-- Google Sign-In Button -->
      <button class="btn btn-google" id="btn-google">
        <svg viewBox="0 0 24 24" width="18" height="18">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Sign in with Google
      </button>

      <div class="divider">or use email</div>

      <form id="login-form" novalidate>
        <div class="form-field">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="admin@savvion.co.ke" autocomplete="email" required>
          <div class="error-msg" id="email-error">Please enter a valid email</div>
        </div>
        <div class="form-field">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required>
          <div class="error-msg" id="password-error">Password is required</div>
        </div>
        <button type="submit" class="btn btn-primary" id="btn-login">
          Sign in <i class="ti ti-arrow-right" aria-hidden="true"></i>
        </button>
      </form>

      <div class="demo-hint" id="setup-hint">
        <strong>Demo credentials:</strong><br>
        Email: admin@savvion.co.ke<br>
        Password: any
      </div>

      <div class="back-link">
        <a href="index.html">← Back to website</a>
      </div>
    </div>
  </div>

  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script>
    (function() {
      const $ = (sel) => document.querySelector(sel);
      const API_BASE = (() => {
        const saved = localStorage.getItem('savvion_api_base');
        if (saved) return saved;
        return window.location.origin;
      })();

       // ─── Google OAuth Config ──────────────────────────────────────────────────────
       // You can override this in browser console: localStorage.setItem('google_client_id', 'your-id')
       const GOOGLE_CLIENT_ID = localStorage.getItem('google_client_id') || '879157775795-jimmahsuvaf1o2v6eftmm90jdap9597v.apps.googleusercontent.com';

      function storeSession(token, user) {
        sessionStorage.setItem('token', token);
        sessionStorage.setItem('user', JSON.stringify(user));
        window.location.href = 'Savvion admin.html';
      }

      function initGoogleSignIn() {
        if (typeof google === 'undefined') {
          setTimeout(initGoogleSignIn, 100);
          return;
        }

        // Hide Google button if not configured
        if (GOOGLE_CLIENT_ID === 'YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com') {
          document.getElementById('btn-google').style.display = 'none';
          console.warn('Google Sign-In not configured: set google_client_id in localStorage');
          return;
        }

        google.accounts.id.initialize({
          client_id: GOOGLE_CLIENT_ID,
          callback: async (response) => {
            const credential = response.credential;
            try {
              const res = await fetch(`${API_BASE}/api/auth/google`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token: credential })
              });
              const data = await res.json();
              if (!res.ok || !data.success) throw new Error(data.error || 'Google auth failed');
              storeSession(data.token, data.user);
            } catch (err) {
              console.error('Google auth error:', err);
              alert('Google sign-in failed. Ensure server is running.\n\nError: ' + err.message);
            }
          },
          auto_select: false
        });

        google.accounts.id.renderButton(
          document.getElementById('btn-google'),
          { theme: 'outline', size: 'large', text: 'signin_with', width: 300 }
        );

        google.accounts.id.prompt((notification) => {
          if (notification.isNotDisplayed()) {
            console.log('Google One Tap not displayed:', notification.getNotDisplayedReason());
          }
        });
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', () => setTimeout(initGoogleSignIn, 500));
      } else {
        setTimeout(initGoogleSignIn, 500);
      }

      // ─── Email/Password Login ────────────────────────────────────────────────────
      async function login(email, password) {
        const btn = $('#btn-login');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span> Signing in…';

        try {
          const res = await fetch(`${API_BASE}/api/auth/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
          });
          const data = await res.json();
          if (!res.ok || !data.success) throw new Error(data.error || 'Login failed');
          storeSession(data.token, data.user);
        } catch (err) {
          console.error('Login error:', err);
          alert('Login failed: ' + err.message + '\n\nMake sure the API server is running at ' + API_BASE);
          btn.disabled = false;
          btn.innerHTML = 'Sign in <i class="ti ti-arrow-right" aria-hidden="true"></i>';
        }
      }

      document.getElementById('login-form').addEventListener('submit', (e) => {
        e.preventDefault();
        const email = $('#email').value.trim();
        const password = $('#password').value;
        if (!email || !password) {
          if (!email) $('#email-error').classList.add('is-visible');
          if (!password) $('#password-error').classList.add('is-visible');
          return;
        }
        $('#email-error').classList.remove('is-visible');
        $('#password-error').classList.remove('is-visible');
        login(email, password);
      });

      $('#email').addEventListener('input', () => $('#email-error').classList.remove('is-visible'));
      $('#password').addEventListener('input', () => $('#password-error').classList.remove('is-visible'));

      // API health check
      fetch(`${API_BASE}/api/health`).then(r => r.json()).then(() => {
        console.log('✅ API connected at', API_BASE);
        if (GOOGLE_CLIENT_ID === 'YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com') {
          const hint = document.getElementById('setup-hint');
          hint.innerHTML = `
            <strong>🔧 Google Login Setup (Optional)</strong><br>
            Get a Client ID from <a href="https://console.cloud.google.com/" target="_blank">Google Cloud Console</a><br>
            Then in browser console run:<br>
            <code>localStorage.setItem('google_client_id','YOUR_CLIENT_ID_HERE')</code><br>
            Refresh page after setting.
          `;
          hint.style.fontSize = '11px';
        }
      }).catch(() => {
        document.getElementById('setup-hint').innerHTML = `
          <strong>⚠️ API server not running</strong><br>
          Start it with: <code>node savvion-api-server.js</code><br>
          Then refresh this page.
        `;
      });
    })();
  </script>
</body>
</html>
